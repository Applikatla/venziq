<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Venziq | Make every AI action provable</title>
    <meta
      name="description"
      content="VENZIQ is trust infrastructure for the AI economy. Verifiable, secure, private, and compliant infrastructure for autonomous AI agents. It brings AI security, AI agents, zero-knowledge, and a blockchain trust layer together in one platform."
    />
    <meta
      name="keywords"
      content="AI Security, AI Agents, Blockchain Infrastructure, Zero Knowledge Proofs, Enterprise AI, Trust Infrastructure, Venziq"
    />
    <meta name="author" content="VENZIQ" />
    <meta name="theme-color" content="#0a0d12" />
    <link rel="canonical" href="https://venziq.com/" />

    <!-- icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://venziq.com/" />
    <meta property="og:title" content="VENZIQ | Trust Infrastructure for the AI Economy" />
    <meta
      property="og:description"
      content="Verifiable, secure, private, and compliant infrastructure for the autonomous economy."
    />
    <meta property="og:image" content="https://venziq.com/og-image.png" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VENZIQ | Trust Infrastructure for the AI Economy" />
    <meta
      name="twitter:description"
      content="Verifiable, secure, private, and compliant infrastructure for the autonomous economy."
    />
    <meta name="twitter:image" content="https://venziq.com/og-image.png" />

    <!-- Organization schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "VENZIQ",
        "url": "https://venziq.com",
        "logo": "https://venziq.com/logo.png",
        "description": "Trust Infrastructure for the AI Economy",
        "sameAs": [
          "https://www.linkedin.com/company/venziq",
          "https://github.com/venziq"
        ]
      }
    </script>

    <script>
      // Set theme before first paint to avoid a flash. Dark is the default.
      (function () {
        try {
          var stored = localStorage.getItem('venziq-theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
